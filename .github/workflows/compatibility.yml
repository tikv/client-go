name: Compatibility Test

on:
  push:
    branches: [master, "feature/*", release-nextgen-20251011, release-nextgen-202603]

jobs:
  tidb-compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: Checkout Client-Go
        uses: actions/checkout@v4
        with:
          path: client-go

      - name: Resolve compatibility refs
        id: refs
        shell: bash
        run: |
          set -euo pipefail
          branch="${GITHUB_BASE_REF:-$GITHUB_REF_NAME}"
          case "$branch" in
            release-nextgen-20251011)
              tidb_ref=release-nextgen-20251011
              ;;
            release-nextgen-202603)
              tidb_ref=release-nextgen-202603
              ;;
            master|feature/*)
              tidb_ref=master
              ;;
            *)
              echo "::error::No TiDB compatibility ref mapping for branch ${branch}"
              exit 1
              ;;
          esac
          echo "tidb_ref=${tidb_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout TiDB
        uses: actions/checkout@v4
        with:
          repository: pingcap/tidb
          ref: ${{ steps.refs.outputs.tidb_ref }}
          path: tidb

      - name: Check build
        run: |
          go mod edit -replace=github.com/tikv/client-go/v2=../client-go
          go mod tidy
          make server
        working-directory: tidb

      - name: Checkout go-ycsb
        uses: actions/checkout@v4
        with:
          repository: pingcap/go-ycsb
          path: go-ycsb

      - name: Check build
        run: |
          go mod edit -replace=github.com/tikv/client-go/v2=../client-go
          go mod tidy
          go build cmd/go-ycsb/*
        working-directory: go-ycsb

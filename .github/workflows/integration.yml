name: Integration Test

on:
  push:
    branches: [master, "feature/*", "release-nextgen-*"]
  pull_request:
    branches: [master, "feature/*", "release-nextgen-*"]

jobs:
  integration-local:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-integration-tests') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25.8

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Test
        run: gotestsum --format short-verbose -- ./...
        working-directory: integration_tests

  integration-local-race:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-integration-tests') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25.8

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Test
        run: gotestsum --format short-verbose -- ./... -race
        working-directory: integration_tests

  integration-tikv:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-integration-tests') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25.8

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Fetch PD
        uses: shrink/actions-docker-extract@v1
        id: extract-pd
        with:
          image: pingcap/pd:nightly
          path: /pd-server

      - name: Fetch TiKV
        uses: shrink/actions-docker-extract@v1
        id: extract-tikv
        with:
          image: pingcap/tikv:nightly
          path: /tikv-server

      - name: Run PD & TiKV
        run: |
          mv ../${{steps.extract-pd.outputs.destination}}/pd-server .
          mv ../${{steps.extract-tikv.outputs.destination}}/tikv-server .
          ./pd-server > pd.log 2>&1 &
          sleep 5
          ./tikv-server -C tikv.toml > tikv.log 2>&1 &
          sleep 15
        working-directory: integration_tests

      - name: Test
        run: gotestsum --format short-verbose -- --with-tikv
        working-directory: integration_tests

  integration-raw-tikv:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-integration-tests') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api_version: [v1ttl, v2]
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25.8

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Fetch PD
        uses: shrink/actions-docker-extract@v1
        id: extract-pd
        with:
          image: pingcap/pd:nightly
          path: /pd-server

      - name: Fetch TiKV
        uses: shrink/actions-docker-extract@v1
        id: extract-tikv
        with:
          image: pingcap/tikv:nightly
          path: /tikv-server

      - name: Run PD & TiKV
        run: |
          mv ../../${{steps.extract-pd.outputs.destination}}/pd-server .
          mv ../../${{steps.extract-tikv.outputs.destination}}/tikv-server .
          ./pd-server > pd.log 2>&1 &
          sleep 5
          ./tikv-server -C tikv-${{ matrix.api_version }}.toml > tikv.log 2>&1 &
          sleep 15
        working-directory: integration_tests/raw

      - name: Test
        run: gotestsum --format short-verbose -- --with-tikv
        working-directory: integration_tests/raw

  integration-next-gen-tikv:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-integration-tests') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25.8

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Resolve Next-Gen Image Tags
        id: resolve-nextgen-tags
        shell: bash
        run: |
          target_branch="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"

          case "${target_branch}" in
            release-nextgen-*)
              pd_tag="${target_branch}"
              tikv_tag="${target_branch}"
              ;;
            *)
              pd_tag="master-nextgen"
              tikv_tag="cloud-engine-nextgen"
              ;;
          esac

          echo "pd_tag=${pd_tag}" >> "${GITHUB_OUTPUT}"
          echo "tikv_tag=${tikv_tag}" >> "${GITHUB_OUTPUT}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: pingcap-testing-account
          workload_identity_provider: projects/890604261603/locations/global/workloadIdentityPools/github-tikv/providers/github-oidc
          service_account: tidbx-gar-reader@pingcap-testing-account.iam.gserviceaccount.com
          token_format: access_token

      - name: Login to GAR
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Fetch Next-Gen PD
        uses: shrink/actions-docker-extract@v1
        id: extract-pd
        with:
          image: us-docker.pkg.dev/pingcap-testing-account/tidbx/tikv/pd/image:${{ steps.resolve-nextgen-tags.outputs.pd_tag }}
          path: /pd-server

      - name: Fetch Next-Gen TiKV
        uses: shrink/actions-docker-extract@v1
        id: extract-tikv
        with:
          image: us-docker.pkg.dev/pingcap-testing-account/tidbx/tikv/tikv/image:${{ steps.resolve-nextgen-tags.outputs.tikv_tag }}
          path: /tikv-server

      - name: Run MinIO, PD & Next-Gen TiKV
        run: |
          mkdir -p tikv-data
          # Install and run minio for S3 backend
          curl -Lo minio https://dl.min.io/server/minio/release/linux-amd64/minio
          chmod +x minio
          mkdir -p $HOME/serverless_s3/cse-test
          MINIO_ROOT_USER=minioadmin MINIO_ROOT_PASSWORD=minioadmin ./minio server $HOME/serverless_s3 > minio.log 2>&1 &
          sleep 5
          # Move binaries and run servers
          mv ../${{steps.extract-pd.outputs.destination}}/pd-server .
          mv ../${{steps.extract-tikv.outputs.destination}}/tikv-server .
          ./pd-server --config pd_next_gen.toml > pd.log 2>&1 &
          sleep 5
          ./tikv-server -C tikv_next_gen.toml --pd-endpoints="127.0.0.1:2379" --addr="127.0.0.1:20160" --data-dir=${{ github.workspace }}/integration_tests/tikv-data > tikv.log 2>&1 &

          echo "Waiting for servers to start..."
          sleep 15

          echo "--- MinIO Log ---"
          tail minio.log || echo "minio.log not found"
          echo "--- PD Log ---"
          tail pd.log || echo "pd.log not found"
          echo "--- TiKV Log ---"
          tail tikv.log || echo "tikv.log not found"
        working-directory: integration_tests

      - name: Test
        run: gotestsum --format short-verbose -- -parallel 1 -tags=nextgen --with-tikv --keyspace-name='keyspace1'
        working-directory: integration_tests
